{% extends 'base.html' %}

{%block content %}
<h2>Register Form</h2>
<form method="post">
    {% csrf_token %}

    {% if form.errors %}
        <div style="color: red;">
            {{ form.errors }}
        </div>
    {% endif %}

    {{forms.as_p}}
    <button class="btn btn-primary">Register</button>
</form>
<p>Do you Have an Account? <a href="{% url 'login' %}">Login Here</a></p>
{% endblock %}
