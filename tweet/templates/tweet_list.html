{% extends 'base.html' %}

{% block title %}
Code
{% endblock %}

{% block content %}
<h1 class="text-center  mt-4">Welcome to Anish Blog</h1>

<a class="btn btn-primary mb-4"  href="{% url 'tweetcreate' %}">Create a Tweet</a>
<div class="container row gap-3">
    {% for tweet in tweets %}
      <div class="card" style="width: 18rem;">
  <img src="{{tweet.photo.url}}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">{{tweet.user.username}}</h5>
    <p class="card-text">{{tweet.text}}</p>
    {% if tweet.user == request.user %}
    <a href="{% url 'tweetedit' tweet.id%}" class="btn btn-primary">Edit</a>
    <a href="{% url 'tweetdelete' tweet.id%}" class="btn btn-danger">Delete</a>
    {% endif %}
  </div>
</div>
    
    
    
{% endfor %}
</div>



{% endblock %}
